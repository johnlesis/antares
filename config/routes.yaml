# config/routes.yaml
routes:
  - method: GET
    path: /patients
    controller: App\Controllers\PatientController
    action: list
    status: 200

  - method: GET
    path: /patients/{id}
    controller: App\Controllers\PatientController
    action: show
    status: 200

  - method: POST
    path: /patients
    controller: App\Controllers\PatientController
    action: create
    status: 201

  - method: PUT
    path: /patients/{id}
    controller: App\Controllers\PatientController
    action: update
    status: 200

  - method: DELETE
    path: /patients/{id}
    controller: App\Controllers\PatientController
    action: delete
    status: 204